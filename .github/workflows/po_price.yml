name: PO Price List (Metal Trims)

on:
  schedule:
    - cron: '0 21 * * *'      # Daily at 3:00 AM BDT (21:00 UTC previous day)
  workflow_dispatch:          # Manual trigger from GitHub UI or gh CLI

jobs:
  run-po-price:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run PO Price List (latest PO price per Odoo code - Metal Trims)
        env:
          ODOO_URL: ${{ secrets.ODOO_URL }}
          ODOO_DB: ${{ secrets.ODOO_DB }}
          ODOO_USERNAME: ${{ secrets.ODOO_USERNAME }}
          ODOO_PASSWORD: ${{ secrets.ODOO_PASSWORD }}
          GOOGLE_CREDS_BASE64: ${{ secrets.GOOGLE_CREDS_BASE64 }}
        run: python PO_Price.py
